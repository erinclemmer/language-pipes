name: Publish sub-packages

# Publishes packages/* to PyPI when their version is bumped. On every push to
# main (and on manual dispatch) each package's [project].version is compared to
# what's already on PyPI; anything not yet published is built and uploaded.

on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - '.github/workflows/publish-packages.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write   # for PyPI Trusted Publishing (OIDC)
    strategy:
      fail-fast: false
      matrix:
        package:
          - name: llm-layer-collector
            dir: packages/llm-layer-collector
          - name: distributed-state-network
            dir: packages/distributed-state-network

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install build tooling
        run: python -m pip install --upgrade pip build hatch

      - name: Read declared version
        id: version
        working-directory: ${{ matrix.package.dir }}
        run: echo "version=$(hatch version)" >> "$GITHUB_OUTPUT"

      - name: Check whether this version is already on PyPI
        id: check
        run: |
          url="https://pypi.org/pypi/${{ matrix.package.name }}/${{ steps.version.outputs.version }}/json"
          code=$(curl -s -o /dev/null -w '%{http_code}' "$url")
          if [ "$code" = "200" ]; then
            echo "${{ matrix.package.name }} ${{ steps.version.outputs.version }} is already published — skipping."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "${{ matrix.package.name }} ${{ steps.version.outputs.version }} is new — will publish."
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        if: steps.check.outputs.publish == 'true'
        run: python -m build "${{ matrix.package.dir }}"

      - name: Publish to PyPI
        if: steps.check.outputs.publish == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ matrix.package.dir }}/dist
